# Render Blueprint — xAi Bot / GORKYPF
# Background Worker + optional Health Web Service
# Node.js/TypeScript project — Python files are legacy and ignored

services:
  # Background Worker: 24/7 mention poller
  - type: worker
    name: xai-bot-worker
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: |
      echo "Installing Node.js dependencies..."
      pnpm install --frozen-lockfile
      echo "Building TypeScript..."
      pnpm build
      echo "Build complete. Output:"
      ls -la dist/
    startCommand: node dist/index.js
    disk:
      name: xai-bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      # Infrastructure
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data

      # State Storage (Redis)
      - key: USE_REDIS
        value: "true"
      - key: KV_URL
        sync: false  # Set in Render dashboard: redis://default:PASS@HOST.upstash.io:6379
      - key: REDIS_KEY_PREFIX
        value: "gorkypf:"

      # X/Twitter API (sensitive - set in dashboard)
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_ACCESS_SECRET
        sync: false

      # LLM Provider (xAI)
      - key: XAI_API_KEY
        sync: false
      - key: XAI_BASE_URL
        value: https://api.x.ai/v1
      - key: XAI_MODEL_PRIMARY
        value: grok-3
      - key: XAI_MODEL_FALLBACKS
        value: grok-3-mini

      # Bot Configuration
      - key: BOT_USERNAME
        value: Gorkypf_on_sol
      - key: LAUNCH_MODE
        value: prod
      - key: BOT_ACTIVATION_MODE
        value: global

      # Polling
      - key: POLL_INTERVAL_MS
        value: "30000"
      - key: MENTIONS_SOURCE
        value: search
      - key: ADAPTIVE_POLLING_ENABLED
        value: "true"

      # Context Engine
      - key: USE_ENHANCED_CONTEXT
        value: "true"

      # Logging
      - key: LOG_LEVEL
        value: INFO

      # Optional Services
      - key: REPLICATE_API_KEY
        sync: false

  # Optional: Health/Metrics Web Service
  - type: web
    name: xai-bot-health
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: LOG_LEVEL
        value: INFO
      - key: USE_REDIS
        value: "true"
      - key: KV_URL
        sync: false
